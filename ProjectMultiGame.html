<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/2592/2592317.png">
    <title>Kinesis.Dev | Ultimate Protector</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0a0a0a; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 90%; max-width: 900px; background: #151515; padding: 30px; border-radius: 15px; border: 2px solid #ff4400; box-shadow: 0 0 30px rgba(255, 68, 0, 0.2); }
        h1 { color: #ff4400; text-align: center; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #666; font-size: 14px; margin-bottom: 25px; }
        input[type="text"] { width: 100%; padding: 15px; margin-bottom: 20px; background: #222; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        textarea { width: 100%; height: 400px; background: #050505; color: #00ff44; border: 1px solid #222; border-radius: 8px; padding: 15px; font-family: 'Consolas', monospace; resize: none; box-sizing: border-box; }
        button { width: 100%; padding: 20px; margin-top: 25px; background: #ff4400; border: none; color: white; font-weight: bold; font-size: 20px; cursor: pointer; border-radius: 8px; transition: 0.3s; box-shadow: 0 5px 15px rgba(255, 68, 0, 0.3); }
        button:hover { background: #ff6622; transform: scale(1.01); }
        .footer { margin-top: 20px; font-size: 11px; color: #444; text-align: center; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Kinesis.Dev ULTIMATE</h1>
        <div class="subtitle">Full Obfuscation & Variable Sync Interface</div>
        
        <input type="text" id="gameName" placeholder="GAME NAME (ex: FlingTrollTower)">
        
        <textarea id="scriptInput" placeholder="PASTE RAW LUA SCRIPT HERE..."></textarea>
        
        <button onclick="protect()">GENERATE & DOWNLOAD PROTECTED SCRIPT</button>
        
        <div class="footer">STRICTLY FOR KINESIS.DEV | BY GENESISCODE</div>
    </div>

    <script>
        function protect() {
            const gameName = document.getElementById('gameName').value || "Script";
            let code = document.getElementById('scriptInput').value;

            if (!code) { alert("Paste something first!"); return; }

            // 1. Nettoyage
            code = code.replace(/--\[\[[\s\S]*?\]\]/g, "");
            code = code.replace(/--.*$/gm, "");

            // 2. BLACKLIST ÉTENDUE (Empêche le renommage des variables clés)
            const blacklist = [
                "game", "script", "workspace", "wait", "task", "Rayfield", 
                "Window", "mainTab", "Tab", "Section", "lp", "plrs", "tool",
                "settings", "event", "handle", "hrp", "targetHRP", "RunService", 
                "Enum", "RS", "mouse", "uis", "pushRemote", "target", "char", "plr"
            ];

            let varCounter = 0;
            const varMap = {};

            // Détection et remplacement sécurisé
            code = code.replace(/local\s+([a-zA-Z_][a-zA-Z0-9_]*)\s*=/g, (match, name) => {
                if (blacklist.includes(name)) return match;
                if (!varMap[name]) {
                    varCounter++;
                    varMap[name] = "v" + varCounter;
                }
                return `local ${varMap[name]}=`;
            });

            // Synchronisation : on remplace les noms utilisés dans le code par les nouveaux noms v1, v2...
            for (const [oldName, newName] of Object.entries(varMap)) {
                const regex = new RegExp(`\\b${oldName}\\b`, 'g');
                code = code.replace(regex, newName);
            }

            // 3. Obfuscation des Textes
            code = code.replace(/("|')(.*?)("|')/g, (match, quote, content) => {
                let bytes = "";
                for (let i = 0; i < content.length; i++) {
                    bytes += "\\" + content.charCodeAt(i);
                }
                return `"${bytes}"`;
            });

            // 4. Minification
            code = code.replace(/\s+/g, " ").trim();

            // 5. Download
            const fileName = gameName.trim() + "Protected.lua";
            const blob = new Blob([code], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
        }
    </script>

</body>
</html>
